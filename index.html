<!DOCTYPE html>

<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Github Issue Tracker</title>

    <!-- DaisyUI & TailwindCSS -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- Google Font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">

    <!-- CSS -->
    <style>
        body {
            font-family: "Geist", sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
        }
        
        .login-card {
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            animation: slideIn 0.5s ease-out;
        }
        
        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        .input-focus {
            transition: all 0.3s ease;
        }
        
        .input-focus:focus {
            box-shadow: 0 0 20px rgba(102, 126, 234, 0.4);
            border-color: #667eea;
        }
        
        .btn-login {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
            color: white;
            font-weight: 600;
            transition: all 0.3s ease;
        }
        
        .btn-login:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
        }
        
        .shadow-top {
            box-shadow: 0 -4px 6px rgba(0, 0, 0, 0.2);
        }
        
        .icon-circle {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 50%;
            width: 70px;
            height: 70px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
    </style>

</head>

<body>

    <!-- Login Container -->
    <div class="flex justify-center items-center min-h-screen p-4">
        <div class="login-card bg-white rounded-2xl w-full max-w-md shadow-2xl p-8">

            <!-- Header -->
            <div class="grid place-items-center py-8">
                <div class="mb-4">
                    <img src="assets/github-logo.png" alt="GitHub Logo" class="w-16 h-16 object-contain">
                </div>
                <h3 class="font-bold text-3xl text-center text-gray-900">GitHub Issues Tracker</h3>
                <p class="text-gray-600 mt-2 text-center text-sm">Sign in to manage your issues efficiently</p>
            </div>

            <!-- Form -->
            <form id="loginForm" class="space-y-5">
                <!-- Username -->
                <div>
                    <label class="label font-semibold text-gray-700 text-sm mb-2">Username</label>
                    <input id="userInput" maxlength="5" minlength="5" type="text" class="input input-bordered w-full input-focus px-4 py-3 rounded-lg text-gray-900" placeholder="admin" autocomplete="off" />
                    <small class="text-gray-400 text-xs block mt-1">5 characters</small>
                </div>

                <!-- Password -->
                <div>
                    <label class="label font-semibold text-gray-700 text-sm mb-2">Password</label>
                    <input id="userPin" maxlength="8" minlength="8" type="password" class="input input-bordered w-full input-focus px-4 py-3 rounded-lg text-gray-900" placeholder="••••••••" autocomplete="off" />
                    <small class="text-gray-400 text-xs block mt-1">8 characters</small>
                </div>

                <!-- Sign In Button -->
                <button id="loginBtn" type="button" class="btn btn-login w-full mt-6 text-white font-bold py-3 rounded-lg">
                    Sign In
                </button>
            </form>

            <!-- Divider -->
            <div class="divider my-6"></div>

            <!-- Demo Credentials -->
            <div class="bg-blue-50 border-l-4 border-blue-500 rounded-lg p-4">
                <p class="text-sm font-semibold text-blue-900 mb-3">
                    <i class="fa-solid fa-circle-info mr-2"></i> Demo Credentials
                </p>
                <p class="text-sm text-blue-800">
                    <strong>Username:</strong> <code class="bg-white px-2 py-1 rounded text-blue-600 font-bold">admin</code>
                </p>
                <p class="text-sm text-blue-800 mt-2">
                    <strong>Password:</strong> <code class="bg-white px-2 py-1 rounded text-blue-600 font-bold">admin123</code>
                </p>
            </div>

        </div>
    </div>

    <!-- JS -->
    <script src="login.js"></script>

</body>

</html>
