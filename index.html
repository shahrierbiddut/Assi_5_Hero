<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Github Issue Tracker</title>
    <!-- Add daisyUI & TailwindCSS -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <!-- Add Font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">

    <!-- Css -->
    <style>
        body {
            font-family: "Geist", sans-serif;
        }
        
        .shadow-top {
            box-shadow: 0 -4px 6px rgba(0, 0, 0, 0.2);
        }
    </style>
</head>

<body>
    <!-- Login-Form -->
    <div class="flex justify-center items-center min-h-screen">
        <fieldset class="fieldset items-center rounded-box w-xs shadow-lg p-4">
            <div class="grid place-items-center py-5">
                <img src="assets/github-logo.png" alt="">
                <h3 class="font-bold text-2xl pt-5">GitHub Issues Tracker</h3>
                <p class="text-[#64748B]">Sign in to Manage your issues</p>
            </div>
            <label class="label font-medium">Username</label>
            <input id="userInput" maxlength="5" minlength="5" type="username" class="input" placeholder="Enter Username" />

            <label class="label font-medium">Password</label>
            <input id="userPin" maxlength="8" minlength="8" type="password" class="input" placeholder="Enter Password" />

            <button id="loginBtn" class="btn btn-primary mt-4">Sign In</button>
        </fieldset>
    </div>

    <!-- Add JS file -->
    <script src="login.js"></script>
</body>

</html>
